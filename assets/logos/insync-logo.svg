<svg width="120" height="40" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
  <!-- InSync Logo Design -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FA6400;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sync Symbol - Two interlocking circles -->
  <g>
    <circle cx="15" cy="20" r="8" fill="none" stroke="#FA6400" stroke-width="2" opacity="0.7"/>
    <circle cx="25" cy="20" r="8" fill="none" stroke="#FA6400" stroke-width="2"/>
    <circle cx="20" cy="20" r="3" fill="#FA6400"/>
  </g>
  
  <!-- InSync Text -->
  <text x="40" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#404040">In</text>
  <text x="55" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FA6400">Sync</text>
  
  <!-- Tagline -->
  <text x="40" y="28" font-family="Arial, sans-serif" font-size="8" fill="#404040" opacity="0.8">RTO PLANNER</text>
</svg>
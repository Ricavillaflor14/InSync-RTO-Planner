<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/logos/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InSync - RTO Planner</title>
    <script>
      (function(l) {
        if (l.search[1] === 'p' && l.search[2] === '=') {
          var decoded = l.search.slice(1).split('&').reduce(function(o, s) {
            var pair = s.split('=');
            if (pair[0] === 'p') o.path = '/' + pair.slice(1).join('=').replace(/~and~/g, '&');
            if (pair[0] === 'q') o.query = '?' + pair.slice(1).join('=').replace(/~and~/g, '&');
            return o;
          }, {});
          window.history.replaceState(null, null,
            l.pathname + (decoded.path || '') + (decoded.query || '') + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>InSync RTO Planner</title>
  <script>
    // GitHub Pages SPA redirect hack
    // This script redirects the browser to the base URL with the current path
    // encoded as a query string to support client-side routing
    const pathSegmentsToKeep = 1;
    const l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
      '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <noscript>
    <p>InSync RTO Planner requires JavaScript to run. Please enable JavaScript in your browser.</p>
  </noscript>
</body>
</html>
